version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "pnpm"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      production-minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-minor-and-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      major-updates:
        update-types:
          - "major"
