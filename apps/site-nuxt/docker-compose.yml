services:
  site-nuxt:
    container_name: site-nuxt
    build:
      context: ../..
      dockerfile: apps/site-nuxt/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      NITRO_HOST: ${NITRO_HOST:-0.0.0.0}
      NITRO_PORT: ${NITRO_PORT:-3000}
      NUXT_PUBLIC_ENVIRONMENT: ${NUXT_PUBLIC_ENVIRONMENT}
      NUXT_PUBLIC_MEDIA_BASE: ${NUXT_PUBLIC_MEDIA_BASE:-}
      NUXT_PUBLIC_FALLBACK_LOCALE: ${NUXT_PUBLIC_FALLBACK_LOCALE}
      NUXT_PUBLIC_SITE_BASE_URL: ${NUXT_PUBLIC_SITE_BASE_URL}
      NUXT_UMBRACO_BASE_URL: ${NUXT_UMBRACO_BASE_URL}
      NUXT_UMBRACO_DELIVERY_API_KEY: ${NUXT_UMBRACO_DELIVERY_API_KEY:-}
      NUXT_UMBRACO_EXCLUDED_DOC_TYPES: ${NUXT_UMBRACO_EXCLUDED_DOC_TYPES:-}
      NUXT_UMBRACO_START_ITEM: ${NUXT_UMBRACO_START_ITEM}
    ports:
      - '127.0.0.1:3010:3000'
